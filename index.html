<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ナイトレイン逆引き 特定色変え版</title>
    <style>
        :root {
            --bg-color: #111;
            --card-bg: #222;
            --text-main: #eee;
            --weak-color: #6cf;
            --resist-color: #f66;
            --special-color: #c77dff;
            --border-color: #444;
        }
        body { font-family: sans-serif; background: var(--bg-color); color: var(--text-main); padding: 15px; margin: 0; }
        .sticky-header { position: sticky; top: 0; background: var(--bg-color); padding: 10px 0; z-index: 10; border-bottom: 1px solid var(--border-color); margin-bottom: 10px; }
        select { 
            width: 100%; padding: 12px; margin-bottom: 10px; 
            background: var(--card-bg); color: #fff; border: 1px solid var(--border-color); border-radius: 8px;
            font-size: 16px; outline: none;
        }
        h3 { border-left: 4px solid #555; padding-left: 10px; margin-top: 20px; font-size: 1.1em; }
        .card { background: var(--card-bg); padding: 12px; margin-bottom: 8px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); border-left: 4px solid #444; }
        .name { font-weight: bold; font-size: 1.1em; margin-bottom: 6px; }
        
        /* 特定ボス用の紫色設定 */
        .highlight { border-left-color: var(--special-color) !important; }
        .highlight .name { color: var(--special-color); }
        
        .weak { color: var(--weak-color); font-size: 0.9em; margin-bottom: 2px; }
        .resist { color: var(--resist-color); font-size: 0.9em; }
        .label { font-weight: bold; margin-right: 5px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="sticky-header">
    <select id="bossSelect"></select>
    <select id="modeSelect">
        <option value="通常">通常モード</option>
        <option value="常世">常世モード</option>
    </select>
</div>

<h3>1日目</h3>
<div id="d1"></div>

<h3>2日目</h3>
<div id="d2"></div>

<script>

    "ツリーガード": { weak: ["なし"], resist: ["なし"] },
    "亜人の女王＆亜人の剣聖": { weak: ["斬","炎"], resist: ["睡眠"] },
    "英雄のガーゴイル": { weak: [], resist: ["全"] },
    "ミミズ顔": { weak: [], resist: ["聖"] },
    "公のフレイディア": { weak: ["打"], resist: ["炎以外","毒","睡眠"] },
    "貪食ドラゴン": { weak: ["出血","冷気"], resist: ["毒","腐敗"] },
    "古竜": { weak: ["なし"], resist: ["なし"] },

    "無名の王": { weak: ["なし"], resist: ["なし"] },

    "爛れた樹霊": { weak: ["なし"], resist: ["なし"] },

    "大赤熊": { weak: ["なし"], resist: ["なし"] },
    "死の騎士": { weak: ["なし"], resist: ["なし"] },
    "神獣獅子舞": { weak: ["なし"], resist: ["なし"] },
    "騎士アルトリウス": { weak: ["なし"], resist: ["なし"] }
};

// --- 2. スケジュールデータ ---
const schedule = {
    "グラディウス": {
        "通常": { d1: ["鈴玉狩り"], d2: ["忌み鬼", "ツリーガード"] },
        "常世": { d1: ["亜人の女王＆亜人の剣聖", "鈴玉狩り"], d2: ["忌み鬼", "ツリーガード"] }
    },
    "エデレ": {
        "通常": { d1: ["英雄のガーゴイル", "ミミズ顔", "公のフレイディア", "貪食ドラゴン"], d2: ["古竜", "僻地の宿将", "坩堝の騎士＆黄金カバ"] },
        "常世": { d1: ["英雄のガーゴイル", "ミミズ顔", "夜の騎兵たち"], d2: ["古竜", "僻地の宿将", "坩堝の騎士＆黄金カバ"] }
    },
    "グノスター": {
        "通常": { d1: ["百足のデーモン", "戦場の宿将", "熔鉄デーモン", "夜の騎兵たち"], d2: ["大土竜", "ノクスの竜人兵", "竜のツリーガード"] },
        "常世": { d1: ["爛れた樹霊","百足のデーモン", "戦場の宿将", "熔鉄デーモン", "ティビアの呼び舟"], d2: ["大土竜", "ノクスの竜人兵", "竜のツリーガード"] }
    },
    "フルゴール": {
        "通常": { d1: ["王族の幽鬼", "貪食ドラゴン", "百足のデーモン", "夜の騎兵たち"], d2: ["ノクスの竜人兵", "僻地の宿将", "無名の王"] },
        "常世": { d1: ["王族の幽鬼", "ミミズ顔", "百足のデーモン", "夜の騎兵たち"], d2: ["ノクスの竜人兵", "僻地の宿将", "無名の王"] }
    },
    "カリゴ": {
        "通常": { d1: ["燻れた樹霊", "接ぎ木の君主", "熔鉄デーモン"], d2: ["冷たい谷の踊り子", "竜のツリーガード"] },
        "常世": { d1: ["燻れた樹霊", "接ぎ木の君主", "熔鉄デーモン", "公のフレイディア", "ティビアの呼び舟"], d2: ["冷たい谷の踊り子", "竜のツリーガード", "神肌の貴種＆神肌の使徒"] }
    },
    "リブラ": {
        "通常": { d1: ["王族の幽鬼", "公のフレイディア", "ティビアの呼び舟", "百足のデーモン"], d2: ["死儀礼の鳥", "坩堝の騎士＆黄金カバ"] },
        "常世": { d1: ["王族の幽鬼", "公のフレイディア", "ティビアの呼び舟", "百足のデーモン", "戦場の宿将"], d2: ["死儀礼の鳥", "坩堝の騎士＆黄金カバ", "神肌の貴種＆神肌の使徒"] }
    },
    "マリス": {
        "通常": { d1: ["英雄のガーゴイル", "貪食ドラゴン", "接ぎ木の君主", "ミミズ顔", "熔鉄デーモン"], d2: ["神肌の貴種＆神肌の使徒", "ツリーガード", "降る星の成獣"] },
        "常世": { d1: ["英雄のガーゴイル", "貪食ドラゴン", "接ぎ木の君主", "ミミズ顔", "熔鉄デーモン"], d2: ["神肌の貴種＆神肌の使徒", "ツリーガード", "降る星の成獣"] }
    },
    "ハルモニア": {
        "通常": { d1: ["傷ついたデーモン＆うろ底のデーモン", "呪剣士＆神獣の戦士"], d2: ["デーモンの王子", "血の君主"] },
        "常世": { d1: ["傷ついたデーモン＆うろ底のデーモン", "呪剣士＆神獣の戦士"], d2: ["デーモンの王子", "血の君主"] }
    },
    "瓦礫の王": {
        "通常": { d1: ["大赤熊", "死の騎士"], d2: ["神獣獅子舞", "騎士アルトリウス"] },
        "常世": { d1: ["大赤熊", "死の騎士"], d2: ["神獣獅子舞", "騎士アルトリウス"] }
    }
};

// --- 3. 判定ロジック ---
function shouldHighlight(routeName, mode, day, bossName) {
    if (mode !== "常世") return false;

    if (routeName === "グラディウス" && bossName === "亜人の女王＆亜人の剣聖") return true;
    if (routeName === "エデレ" && bossName === "夜の騎兵たち") return true;
    if (routeName === "グノスター" && bossName === "ティビアの呼び舟") return true;
    if (routeName === "フルゴール" && bossName === "ミミズ顔") return true;
    if (routeName === "カリゴ") {
        return ["公のフレイディア", "ティビアの呼び舟", "神肌の貴種＆神肌の使徒"].includes(bossName);
    }
    if (routeName === "リブラ") {
        return ["戦場の宿将", "神肌の貴種＆神肌の使徒"].includes(bossName);
    }
    
    return false;
}

// --- 4. 描画処理 ---
const bSelect = document.getElementById("bossSelect");
const mSelect = document.getElementById("modeSelect");

Object.keys(schedule).forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    bSelect.appendChild(opt);
});

function draw(names, targetId, dayKey) {
    const el = document.getElementById(targetId);
    const routeName = bSelect.value;
    const mode = mSelect.value;
    el.innerHTML = "";
    
    names.forEach(name => {
        const data = bossMasterData[name] || { weak: ["不明"], resist: ["不明"] };
        const highlightClass = shouldHighlight(routeName, mode, dayKey, name) ? "highlight" : "";
        
        el.innerHTML += `
            <div class="card ${highlightClass}">
                <div class="name">${name}</div>
                <div class="weak"><span class="label">弱点:</span>${data.weak.join(", ") || "なし"}</div>
                <div class="resist"><span class="label">耐性:</span>${data.resist.join(", ") || "なし"}</div>
            </div>`;
    });
}

function update() {
    const route = schedule[bSelect.value][mSelect.value];
    draw(route.d1, "d1", "d1");
    draw(route.d2, "d2", "d2");
}

bSelect.onchange = update;
mSelect.onchange = update;
update();
</script>

</body>
</html>
