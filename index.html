<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ナイトレイン逆引き コンプリート版</title>
    <style>
        :root {
            --bg-color: #111;
            --card-bg: #222;
            --text-main: #eee;
            --weak-color: #6cf;
            --resist-color: #f66;
            --special-color: #c77dff;
            --border-color: #444;
        }
        body { font-family: sans-serif; background: var(--bg-color); color: var(--text-main); padding: 15px; margin: 0; }
        .sticky-header { position: sticky; top: 0; background: var(--bg-color); padding: 10px 0; z-index: 10; border-bottom: 1px solid var(--border-color); margin-bottom: 10px; }
        select { 
            width: 100%; padding: 12px; margin-bottom: 10px; 
            background: var(--card-bg); color: #fff; border: 1px solid var(--border-color); border-radius: 8px;
            font-size: 16px; outline: none;
        }
        h3 { border-left: 4px solid #555; padding-left: 10px; margin-top: 20px; font-size: 1.1em; }
        .card { background: var(--card-bg); padding: 12px; margin-bottom: 8px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); border-left: 4px solid #444; }
        .name { font-weight: bold; font-size: 1.1em; margin-bottom: 6px; }
        .highlight { border-left-color: var(--special-color) !important; }
        .highlight .name { color: var(--special-color); }
        .route-label { font-size: 0.75em; background: #444; padding: 2px 6px; border-radius: 4px; vertical-align: middle; margin-left: 8px; color: #ccc; }
        .weak { color: var(--weak-color); font-size: 0.9em; margin-bottom: 2px; }
        .resist { color: var(--resist-color); font-size: 0.9em; }
        .label { font-weight: bold; margin-right: 5px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="sticky-header">
    <select id="bossSelect"></select>
    <select id="modeSelect">
        <option value="通常">通常モード</option>
        <option value="常世">常世モード</option>
    </select>
    <select id="reverseSelect" style="display:none; border-color: var(--special-color);"></select>
</div>

<div id="displayArea">
    <h3 id="d1_title">1日目</h3>
    <div id="d1"></div>
    <h3 id="d2_title">2日目以降の候補</h3>
    <div id="d2"></div>
</div>

<script>
// --- 1. ボスマスタデータ (攻略情報を反映) ---
const bossMasterData = {
    "鈴玉狩り": { weak: ["刺","⚡雷","毒","腐敗","睡眠"], resist: ["打"] },
    "忌み鬼": { weak: ["出血","冷気","毒"], resist: ["聖"] },
    "ツリーガード": { weak: ["打","⚡雷"], resist: ["刺","聖"] },
    "亜人の女王＆亜人の剣聖": { weak: ["斬","🔥炎"], resist: ["睡眠"] },
    "英雄のガーゴイル": { weak: ["打"], resist: ["全属性","状態異常"] },
    "ミミズ顔": { weak: ["物理全般"], resist: ["聖","属性全般"] },
    "公のフレイディア": { weak: ["打"], resist: ["毒","睡眠","属性全般"] },
    "貪食ドラゴン": { weak: ["刺","⚡雷","出血","冷気"], resist: ["毒","腐敗"] },
    "古竜": { weak: ["刺"], resist: ["⚡雷","🔥炎"] },
    "僻地の宿将": { weak: ["刺","🔥炎","状態異常"], resist: ["魔術","冷気"] },
    "坩堝の騎士＆黄金カバ": { weak: ["🔥炎","⚡雷"], resist: ["聖","状態異常"] },
    "夜の騎兵たち": { weak: ["打","⚡雷","毒","腐敗","睡眠"], resist: ["聖"] },
    "百足のデーモン": { weak: ["冷気","魔術"], resist: ["🔥炎"] },
    "戦場の宿将": { weak: ["刺","🔥炎"], resist: ["属性耐性高め"] },
    "熔鉄デーモン": { weak: ["⚡雷","打"], resist: ["🔥炎","出血"] },
    "大土竜": { weak: ["打","⚡雷"], resist: ["🔥炎","魔術"] },
    "ノクスの竜人兵": { weak: ["斬","⚡雷"], resist: ["冷気","毒"] },
    "竜のツリーガード": { weak: ["打","毒","腐敗"], resist: ["⚡雷","🔥炎","聖"] },
    "ティビアの呼び舟": { weak: ["聖","打"], resist: ["状態異常無効"] },
    "王族の幽鬼": { weak: ["回復祈祷","出血"], resist: ["毒","腐敗"] },
    "無名の王": { weak: ["🔥炎"], resist: ["⚡雷"] },
    "燻れた樹霊": { weak: ["🔥炎","冷気"], resist: ["聖","魔術"] },
    "爛れた樹霊": { weak: ["🔥炎"], resist: ["聖","毒"] },
    "接ぎ木の君主": { weak: ["冷気","出血"], resist: ["聖"] },
    "冷たい谷の踊り子": { weak: ["打","🔥炎","闇"], resist: ["冷気"] },
    "神肌の貴種＆神肌の使徒": { weak: ["斬","出血","睡眠"], resist: ["🔥炎","聖"] },
    "死儀礼の鳥": { weak: ["聖","打"], resist: ["🔥炎","冷気","出血"] },
    "降る星の成獣": { weak: ["打","属性全般"], resist: ["物理属性以外"] },
    "傷ついたデーモン＆うろ底のデーモン": { weak: ["出血","冷気"], resist: ["🔥炎","毒"] },
    "呪剣士＆神獣の戦士": { weak: ["🔥炎","出血"], resist: ["冷気"] },
    "デーモンの王子": { weak: ["出血"], resist: ["🔥炎","毒"] },
    "血の君主": { weak: ["出血（有効）","物理全般"], resist: ["🔥炎"] },
    "大赤熊": { weak: ["🔥炎","出血"], resist: ["なし"] },
    "死の騎士": { weak: ["物理全般","冷気"], resist: ["⚡雷","出血"] },
    "神獣獅子舞": { weak: ["🔥炎","出血"], resist: ["冷気","⚡雷"] },
    "騎士アルトリウス": { weak: ["なし"], resist: ["属性耐性全般"] }
};

// --- 2. スケジュールデータ ---
const schedule = {
    "グラディウス": {
        "通常": { d1: ["鈴玉狩り"], d2: ["忌み鬼", "ツリーガード"] },
        "常世": { d1: ["亜人の女王＆亜人の剣聖", "鈴玉狩り"], d2: ["忌み鬼", "ツリーガード"] }
    },
    "エデレ": {
        "通常": { d1: ["英雄のガーゴイル", "ミミズ顔", "公のフレイディア", "貪食ドラゴン"], d2: ["古竜", "僻地の宿将", "坩堝の騎士＆黄金カバ"] },
        "常世": { d1: ["英雄のガーゴイル", "ミミズ顔", "夜の騎兵たち"], d2: ["古竜", "僻地の宿将", "坩堝の騎士＆黄金カバ"] }
    },
    "グノスター": {
        "通常": { d1: ["百足のデーモン", "戦場の宿将", "熔鉄デーモン", "夜の騎兵たち"], d2: ["大土竜", "ノクスの竜人兵", "竜のツリーガード"] },
        "常世": { d1: ["爛れた樹霊","百足のデーモン", "戦場の宿将", "熔鉄デーモン", "ティビアの呼び舟"], d2: ["大土竜", "ノクスの竜人兵", "竜のツリーガード"] }
    },
    "フルゴール": {
        "通常": { d1: ["王族の幽鬼", "貪食ドラゴン", "百足のデーモン", "夜の騎兵たち"], d2: ["ノクスの竜人兵", "僻地の宿将", "無名の王"] },
        "常世": { d1: ["王族の幽鬼", "ミミズ顔", "百足のデーモン", "夜の騎兵たち"], d2: ["ノクスの竜人兵", "僻地の宿将", "無名の王"] }
    },
    "カリゴ": {
        "通常": { d1: ["燻れた樹霊", "接ぎ木の君主", "熔鉄デーモン"], d2: ["冷たい谷の踊り子", "竜のツリーガード"] },
        "常世": { d1: ["燻れた樹霊", "接ぎ木の君主", "熔鉄デーモン", "公のフレイディア", "ティビアの呼び舟"], d2: ["冷たい谷の踊り子", "竜のツリーガード", "神肌の貴種＆神肌の使徒"] }
    },
    "リブラ": {
        "通常": { d1: ["王族の幽鬼", "公のフレイディア", "ティビアの呼び舟", "百足のデーモン"], d2: ["死儀礼の鳥", "坩堝の騎士＆黄金カバ"] },
        "常世": { d1: ["王族の幽鬼", "公のフレイディア", "ティビアの呼び舟", "百足のデーモン", "戦場の宿将"], d2: ["死儀礼の鳥", "坩堝の騎士＆黄金カバ", "神肌の貴種＆神肌の使徒"] }
    },
    "マリス": {
        "通常": { d1: ["英雄のガーゴイル", "貪食ドラゴン", "接ぎ木の君主", "ミミズ顔", "熔鉄デーモン"], d2: ["神肌の貴種＆神肌の使徒", "ツリーガード", "降る星の成獣"] },
        "常世": { d1: ["英雄のガーゴイル", "貪食ドラゴン", "接ぎ木の君主", "ミミズ顔", "熔鉄デーモン"], d2: ["神肌の貴種＆神肌の使徒", "ツリーガード", "降る星の成獣"] }
    },
    "ハルモニア": {
        "通常": { d1: ["傷ついたデーモン＆うろ底のデーモン", "呪剣士＆神獣の戦士"], d2: ["デーモンの王子", "血の君主"] },
        "常世": { d1: ["傷ついたデーモン＆うろ底のデーモン", "呪剣士＆神獣の戦士"], d2: ["デーモンの王子", "血の君主"] }
    },
    "瓦礫の王": {
        "通常": { d1: ["大赤熊", "死の騎士"], d2: ["神獣獅子舞", "騎士アルトリウス"] },
        "常世": { d1: ["大赤熊", "死の騎士"], d2: ["神獣獅子舞", "騎士アルトリウス"] }
    }
};

// --- 3. ロジック ---
function shouldHighlight(routeName, mode, bossName) {
    if (mode !== "常世") return false;
    const targets = {
        "グラディウス": ["亜人の女王＆亜人の剣聖"],
        "エデレ": ["夜の騎兵たち"],
        "グノスター": ["ティビアの呼び舟"],
        "フルゴール": ["ミミズ顔"],
        "カリゴ": ["公のフレイディア", "ティビアの呼び舟", "神肌の貴種＆神肌の使徒"],
        "リブラ": ["戦場の宿将", "神肌の貴種＆神肌の使徒"]
    };
    return targets[routeName]?.includes(bossName) || false;
}

const bSelect = document.getElementById("bossSelect");
const mSelect = document.getElementById("modeSelect");
const rSelect = document.getElementById("reverseSelect");

Object.keys(schedule).forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    bSelect.appendChild(opt);
});
const specialOpt = document.createElement("option");
specialOpt.value = "REVERSE";
specialOpt.textContent = "【逆引き】1日目のボスから探す";
bSelect.appendChild(specialOpt);

function updateReverseOptions() {
    rSelect.innerHTML = '<option value="">▼ 1日目のボスを選択</option>';
    const mode = mSelect.value;
    const firstDayBosses = new Set();
    Object.values(schedule).forEach(routes => routes[mode].d1.forEach(b => firstDayBosses.add(b)));
    Array.from(firstDayBosses).sort().forEach(b => {
        const opt = document.createElement("option");
        opt.value = b;
        opt.textContent = b;
        rSelect.appendChild(opt);
    });
}

function drawCard(name, container, routeName, mode) {
    const data = bossMasterData[name] || { weak: ["不明"], resist: ["不明"] };
    const highlight = shouldHighlight(routeName, mode, name) ? "highlight" : "";
    container.innerHTML += `
        <div class="card ${highlight}">
            <div class="name">${name}${routeName ? `<span class="route-label">${routeName}</span>` : ''}</div>
            <div class="weak"><span class="label">弱点:</span>${data.weak.join(", ") || "なし"}</div>
            <div class="resist"><span class="label">耐性:</span>${data.resist.join(", ") || "なし"}</div>
        </div>`;
}

function update() {
    const mode = mSelect.value;
    const d1 = document.getElementById("d1");
    const d2 = document.getElementById("d2");
    d1.innerHTML = ""; d2.innerHTML = "";

    if (bSelect.value === "REVERSE") {
        rSelect.style.display = "block";
        document.getElementById("d1_title").textContent = "出現したボス";
        document.getElementById("d2_title").textContent = "該当ルートと2日目以降の候補";
        const targetBoss = rSelect.value;
        if (!targetBoss) return;
        Object.keys(schedule).forEach(routeName => {
            const routeData = schedule[routeName][mode];
            if (routeData.d1.includes(targetBoss)) {
                drawCard(targetBoss, d1, routeName, mode);
                routeData.d2.forEach(b => drawCard(b, d2, routeName, mode));
            }
        });
    } else {
        rSelect.style.display = "none";
        document.getElementById("d1_title").textContent = "1日目";
        document.getElementById("d2_title").textContent = "2日目";
        const routeData = schedule[bSelect.value][mode];
        routeData.d1.forEach(b => drawCard(b, d1, null, mode));
        routeData.d2.forEach(b => drawCard(b, d2, null, mode));
    }
}

bSelect.onchange = () => { updateReverseOptions(); update(); };
mSelect.onchange = () => { updateReverseOptions(); update(); };
rSelect.onchange = update;
updateReverseOptions();
update();
</script>
</body>
</html>
