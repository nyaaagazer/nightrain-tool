<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>ナイトレイン逆引き</title>

<style>
body { font-family:sans-serif; background:#111; color:#eee; padding:15px;}
select { width:100%; padding:12px; margin-bottom:10px;}
.card { background:#222; padding:10px; margin-bottom:8px; border-radius:8px;}
.name { font-weight:bold;}
.weak { color:#6cf;}
.resist { color:#f66;}
.special { color:#c77dff; }
</style>
</head>

<body>

<select id="boss"></select>
<select id="mode">
<option value="通常">通常</option>
<option value="常世">常世</option>
</select>

<h3>1日目</h3>
<div id="d1"></div>

<h3>2日目</h3>
<div id="d2"></div>

<script>

function make(name, weak=[], resist=[]){
return {name, weak, resist};
}

const specialList = [
"亜人の女王＆亜人の剣聖",
"夜の騎兵たち",
"ティビアの呼び舟",
"ミミズ顔",
"公のフレイディア",
"神肌の貴種＆神肌の使徒",
"死儀礼の鳥"
];

const data = {

"グラディウス":{
"通常":{
d1:[make("鈴玉狩り",["毒","腐敗","睡眠"],["刺","雷"])],
d2:[make("忌み鬼"),make("ツリーガード")]
},
"常世":{
d1:[
make("亜人の女王＆亜人の剣聖",["斬","炎"],["睡眠"]),
make("鈴玉狩り",["毒","腐敗","睡眠"],["刺","雷"])
],
d2:[make("忌み鬼"),make("ツリーガード")]
}
},

"エデレ":{
"通常":{
d1:[
make("英雄のガーゴイル",[],["全"]),
make("ミミズ顔",[],["聖"]),
make("公のフレイディア",["打"],["炎以外","毒","睡眠"]),
make("貪食ドラゴン",["出血","冷気"],["毒","腐敗"])
],
d2:[make("古竜"),make("砕地の宿将",["状態異常"],["属性","斬"]),make("坩堝の騎士＆黄金カバ")]
},
"常世":{
d1:[
make("英雄のガーゴイル",[],["全"]),
make("ミミズ顔",[],["聖"]),
make("夜の騎兵たち",["毒","腐敗","睡眠"],["全属性","雷弱め"])
],
d2:[make("古竜"),make("砕地の宿将",["状態異常"],["属性","斬"]),make("坩堝の騎士＆黄金カバ")]
}
},

"グノスター":{
"通常":{
d1:[make("百足のデーモン"),make("戦場の宿将"),make("熔鉄デーモン"),make("夜の騎兵たち")],
d2:[make("大土竜"),make("ノクスの竜人兵"),make("竜のツリーガード＆王都の騎兵")]
},
"常世":{
d1:[make("百足のデーモン"),make("戦場の宿将"),make("熔鉄デーモン"),make("夜の騎兵たち"),make("ティビアの呼び舟")],
d2:[make("大土竜"),make("ノクスの竜人兵"),make("竜のツリーガード＆王都の騎兵"),make("夜の騎兵たち")]
}
},

"フルゴール":{
"通常":{
d1:[make("王族の幽鬼"),make("貪食ドラゴン"),make("百足のデーモン"),make("夜の騎兵たち")],
d2:[make("ノクスの竜人兵"),make("砕地の宿将"),make("無名の王")]
},
"常世":{
d1:[make("王族の幽鬼"),make("ミミズ顔"),make("百足のデーモン"),make("夜の騎兵たち")],
d2:[make("ノクスの竜人兵"),make("砕地の宿将"),make("無名の王")]
}
},

"カリゴ":{
"通常":{
d1:[make("燻れた樹霊"),make("接ぎ木の君主"),make("熔鉄デーモン")],
d2:[make("冷たい谷の踊り子"),make("竜のツリーガード＆王都の騎兵")]
},
"常世":{
d1:[make("燻れた樹霊"),make("接ぎ木の君主"),make("熔鉄デーモン"),make("公のフレイディア"),make("ティビアの呼び舟")],
d2:[make("冷たい谷の踊り子"),make("竜のツリーガード＆王都の騎兵"),make("神肌の貴種＆神肌の使徒")]
}
},

"リブラ":{
"通常":{
d1:[make("王族の幽鬼"),make("公のフレイディア"),make("ティビアの呼び舟"),make("百足のデーモン")],
d2:[make("死儀礼の鳥"),make("坩堝の騎士＆黄金カバ")]
},
"常世":{
d1:[make("王族の幽鬼"),make("公のフレイディア"),make("ティビアの呼び舟"),make("百足のデーモン"),make("戦場の宿将")],
d2:[make("死儀礼の鳥"),make("坩堝の騎士＆黄金カバ"),make("神肌の貴種＆神肌の使徒")]
}
},

"マリス":{
"通常":{
d1:[make("英雄のガーゴイル"),make("貪食ドラゴン"),make("接ぎ木の君主"),make("ミミズ顔"),make("熔鉄デーモン")],
d2:[make("神肌の貴種＆神肌の使徒"),make("ツリーガード＆王都の騎兵"),make("降る星の成獣")]
},
"常世":{
d1:[make("英雄のガーゴイル"),make("貪食ドラゴン"),make("接ぎ木の君主"),make("ミミズ顔"),make("熔鉄デーモン")],
d2:[make("神肌の貴種＆神肌の使徒"),make("ツリーガード＆王都の騎兵"),make("降る星の成獣")]
}
},

"ハルモニア":{
"通常":{
d1:[make("傷ついたデーモン＆うろ底のデーモン"),make("呪剣士＆神獣の戦士")],
d2:[make("デーモンの王子"),make("血の君主（もーぐ様）")]
},
"常世":{
d1:[make("傷ついたデーモン＆うろ底のデーモン"),make("呪剣士＆神獣の戦士")],
d2:[make("デーモンの王子"),make("血の君主（もーぐ様）")]
}
},

"瓦礫の王":{
"通常":{
d1:[make("大赤熊"),make("死の騎士")],
d2:[make("神獣獅子舞"),make("騎士アルトリウス")]
},
"常世":{
d1:[make("大赤熊"),make("死の騎士")],
d2:[make("神獣獅子舞"),make("騎士アルトリウス")]
}
}

};

const boss=document.getElementById("boss");
Object.keys(data).forEach(b=>boss.innerHTML+=`<option>${b}</option>`);

function draw(list,id){
const el=document.getElementById(id);
el.innerHTML="";
list.forEach(x=>{
const isSpecial = specialList.includes(x.name);
el.innerHTML+=`
<div class="card">
<div class="name ${isSpecial?"special":""}">${x.name}</div>
<div class="weak">弱点：${x.weak.join(", ")||"なし"}</div>
<div class="resist">耐性：${x.resist.join(", ")||"なし"}</div>
</div>`;
});
}

function update(){
const b=data[boss.value][document.getElementById("mode").value];
draw(b.d1,"d1");
draw(b.d2,"d2");
}

boss.onchange=update;
document.getElementById("mode").onchange=update;
update();

</script>

</body>
</html>
